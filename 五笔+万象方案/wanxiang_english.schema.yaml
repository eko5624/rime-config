# Rime schema
# encoding: utf-8
schema:
  schema_id: wanxiang_english
  name: 万象英文
  version: "lts"
  icon: icons/ju.ico
  ascii_icon: icons/en.ico
  author: amzxyz
  description: |
    支持整句输入英文的语句流方案，拥有更加智能的词组上屏加空格策略，支持单词组、语句任意词组中首字母大写或者全大写格式化。

switches:
  - name: ascii_mode
    reset: 0
    states: [整句, 字母]

engine:
  processors:
    - ascii_composer
    - key_binder
    - speller
    - recognizer
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator
    - table_translator@wanxiang_english    #英文词汇表导入
    - punct_translator
  filters:
    - lua_filter@*super_english
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA\
  delimiter: " '"
  algebra:
    - derive|^(.{1,3})$|$1/|
    # 数字派生
    - derive/1([4-7|9])/$1teen/
    - derive/11/eleven/
    - derive/12/twelve/
    - derive/13/thirteen/
    - derive/15/fifteen/
    - derive/18/eighteen/
    - derive/0/o/
    - derive/0/O/
    - derive/0/zero/
    - derive/1/one/
    - derive/10/ten/
    - derive/2/to/
    - derive/2/two/
    - derive/3/three/
    - derive/4/for/
    - derive/4/four/
    - derive/5/five/
    - derive/6/six/
    - derive/7/seven/
    - derive/8/eight/
    - derive/9/nine/
    # 符号派生
    - derive/\+/plus/
    - derive/\./dot/
    - derive/@/at/
    - derive/-/hyphen/
    - derive/#/hash/
    - derive/#/number/
    - derive/#/sharp/
    - derive/♯/sharp/
    - derive / slash
    - derive/&/and/
    - derive/%/percent/
    # 派生无单个特殊字符的拼写
    - derive/[.]//
    - derive/[+]//
    - derive/[@]//
    - derive/[-]//
    - derive/[_]//
    - erase/^[^a-zA-Z0-9].+$/
    - derive/^.+$/\L$0/
    - derive/^.+$/\U$0/
    - derive/^./\U$0/
    - derive/^([a-z]{2})/\U$1/
translator:
  dictionary: wanxiang_english
  enable_user_dict: false
  initial_quality: 2
  comment_format:
    - xform/^~.+$//
key_binder:
  import_preset: default
  bindings:
    - { when: always, select: .next, accept: Control+1 }             # 在最近的两个方案之间切换
recognizer:
  import_preset: default

wanxiang_english:
  dictionary: wanxiang_english
  user_dict: en
  enable_completion: true
  enable_sentence: true
  initial_quality: 3
  comment_format:  #这里很重要如果残留带声调字母，剩余编码提示计算出错引发程序崩溃
    - xform/^~.+$//
  #英文自动加空格，除关闭外共有3种模式可供选择
  #off: 关闭; before: 总是前加; after: 总是后加; 
  #smart: 智能模式连续输入英文时第二个单词前开始加空格，非输入状态的回车与空格都能打断加空格状态
  #支持设置延时销毁加空格状态，单位秒,0不超时，大于0为超时时间，极大的保证了连续输入的体验。
  english_spacing: smart
  spacing_timeout: 5