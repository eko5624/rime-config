schema:
  schema_id: wanxiang
  name: 万象拼音
  version: "1.0"
  icon: icons/zh.ico
  ascii_icon: icons/en.ico
  full_icon: icons/full.ico
  half_icon: icons/half.ico
  author:
    - amzxyz
  description: |
    基于超大规模语料的RIME带调拼音方案
  dependencies:
    - wubi86
    - radical_pinyin

switches:
  - name: emoji
    states: [ 💀, 😄 ]
    reset: 1
  - name: ascii_mode
    states: [ 中, 英 ]
    reset: 0
  - options: [ std, s2hk, s2twp ]
    states: [ 简体, 港繁, 台繁 ]
    reset: 0
  - options: [raw_input, tone_display, full_pinyin]  #开启后在输入编码的位置实时转换为带声调全拼或者不带声调全拼，不开启则采用系统配置原始编码，影响的是preedit_format
    states: [原编码, 有声调, 无声调]
    reset: 1     #对于开关组从0开始数，第几个就reset几可设为默认
  - name: extend_charset # 0为CJK基本字符集+扩展A区，1为CJK全字符集
    states: [ 常, 扩 ]
    reset: 1
  - name: charset_comment
    states: [ 码区关, 码区开 ]
    reset: 1
  - name: full_shape
    states: [ 半, 全 ]
    reset: 0
  - name: ascii_punct  # 中英标点
    states: [ "。，", "．，" ]
    reset: 0
    
engine:
  processors:
    - lua_processor@*select_character
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@radical_lookup
    - affix_segmentor@wubi86_lookup
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - history_translator@history
    - lua_translator@time_date
    - lua_translator@*calculator
    - lua_translator@*number                    # 数字金额大写
    - lua_translator@*force_gc                  # 暴力 GC 降低内存
    - lua_translator@*unicode                   # Unicode
    - table_translator@custom_phrase            # 自定义短语 custom_phrase.txt
    - table_translator@chengyu                  # 简码成语
    - reverse_lookup_translator@radical_lookup
    - reverse_lookup_translator@wubi86_lookup
    - script_translator
  filters:
    - simplifier
    - simplifier@s2hk
    - simplifier@s2tw
    #- simplifier@transcription_cc
    - simplifier@emoji                          # Emoji OpenCC
    - lua_filter@*charset*filter                # CJK字符集过滤
    - lua_filter@*charset*comment_hint          # CJK字符集码区提示
    - lua_filter@*super_comment_preedit         # 放其他需要注释处理器后面,会有清空注释的操作,超级注释模块，部件组字读音注释，
    - uniquifier                                # 去重

# 简繁转换
# transcription_cc:
  # option_name: transcription
  # opencc_config: s2t.json             # 简 -> 繁
  # opencc_config: s2hk.json              # 简 -> 香港
  # opencc_config: t2s.json             # 繁 -> 简
  # opencc_config: t2tw.json            # 繁 -> 台湾
  # opencc_config: t2hk.json            # 繁 -> 香港
  # opencc_config: s2tw.json            # 簡 -> 臺灣標準
  # opencc_config: s2twp.json           # 簡 -> 臺灣片語
  # tips: none                            # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  # tags: [abc]                           # 限制在对应 tag 只在五笔输入时启用简繁转换

s2hk:
  opencc_config: s2hk.json
  option_name: s2hk
  tags: [abc]                           # 限制在对应 tag 反查时不进行简繁转换
  tips: all

s2tw:
  opencc_config: s2twp.json
  option_name: s2twp
  tags: [abc]                           # 限制在对应 tag 反查时不进行简繁转换
  tips: all

# 自定义短语
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase  # 需要手动创建 custom_phrase.txt 文件
  db_class: stabledb
  enable_completion: false # 补全提示
  enable_sentence: false   # 禁止造句
  initial_quality: 99

# 简码词库导入位于jm_dicts得txt文件词库
chengyu:
  dictionary: ""
  user_dict: jm_dicts/chengyu
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: 100 #本表词和系统词重码居后

emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false                # 在 corrector.lua 及反查中，emoji 返回空注释

history:
  input: z
  size: 1
  initial_quality: 1

grammar:
  language: wanxiang-lts-zh-hans
  collocation_max_length: 6
  collocation_min_length: 2
  collocation_penalty: -14
  non_collocation_penalty: -6
  weak_collocation_penalty: -100
  rear_penalty: -18

translator:
  dictionary: wanxiang         # 挂载主词库
  enable_completion: true      # 启用候选词补全
  enable_user_dict: true       # 是否开启自动调频，即开启用户词典
  #  enable_sentence: false       #是否开启自动造句
  #  enable_correction: false     #是否开启自动纠错
  #  encode_commit_history: true  # 预留历史上屏自动编码成词
  core_word_length: 4  # >0 启用，按段学词 + 相邻段拼接
  max_word_length: 7  # >0 启用，过长短语不记整词，只加元素权重
  contextual_suggestions: false  #模型用来开启词组权重预测，效果一般关闭
  max_homophones: 8
  initial_quality: 3  #初始质量拼音的权重应该比英文大
  spelling_hints: 30  #将注释以词典code字符串形式完全暴露，通过super_comment.lua完全接管，灵活配置。
  always_show_comments: true  # Rime 默认在 preedit 等于 comment 时取消显示 comment，这里强制一直显示，供super_comment_preedit.lua做判断用。
  comment_format:  #将注释以词典字符串形式完全暴露，通过super_preedit.lua完全接管，灵活配置。
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ve/$1üe/
    - xform/([nl])ven/$1uen/
    - xform/([jqxy])v/$1u/
    - 'xform ([aeiou])(ng?|r)([-;/<,>\\]) $1$3$2'
    - 'xform ([aeo])([iuo])([-;/<,>\\]) $1$3$2'
    - 'xform a[-;] ā'
    - 'xform a/ á'
    - 'xform a[<,] ǎ'
    - 'xform a[>\\] à'
    - 'xform e[-;] ē'
    - 'xform e/ é'
    - 'xform e[<,] ě'
    - 'xform e[>\\] è'
    - 'xform o[-;] ō'
    - 'xform o/ ó'
    - 'xform o[<,] ǒ'
    - 'xform o[>\\] ò'
    - 'xform i[-;] ī'
    - 'xform i/ í'
    - 'xform i[<,] ǐ'
    - 'xform i[>\\] ì'
    - 'xform u[-;] ū'
    - 'xform u/ ú'
    - 'xform u[<,] ǔ'
    - 'xform u[>\\] ù'
    - 'xform ü/ ǘ'
    - 'xform ü[<,] ǚ'
    - 'xform ü[>\\] ǜ'

speller:
  # table_translator翻译器，支持自动上屏。例如 “zmhu”可以自动上屏“怎么回事”
  #  auto_select: true
  #  auto_select_pattern: ^[a-z]+/|^[a-df-zA-DF-Z]\w{3}|^e\w{4}
  # 如果不想让什么标点直接上屏，可以加在 alphabet，或者编辑标点符号为两个及以上的映射，alphabet就是将字符纳入输入编码的范畴
  alphabet: 'zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA-;/<,>\'
  # initials 定义仅作为始码的按键，排除 ` 让单个的 ` 可以直接上屏
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"  # 系统配置，第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  visual_delimiter: " "  # super_preedit.lua配置：是否让分隔符号跟着一起转换，例如nǐ'hǎo 在实际使用中表现出视觉拥挤，我们可以让delimiter平时是'转换为拼音的时候使用空格nǐ hǎo，更符合实际。
  # 拼写匹配
  algebra:
    - xform/^([a-z]+)$/$1④/
    - xform/ā([a-z]*)$/a$1①/
    - xform/á([a-z]*)$/a$1②/
    - xform/ǎ([a-z]*)$/a$1③/
    - xform/à([a-z]*)$/a$1④/
    - xform/ō([a-z]*)$/o$1①/
    - xform/ó([a-z]*)$/o$1②/
    - xform/ǒ([a-z]*)$/o$1③/
    - xform/ò([a-z]*)$/o$1④/
    - xform/ē([a-z]*)$/e$1①/
    - xform/é([a-z]*)$/e$1②/
    - xform/ě([a-z]*)$/e$1③/
    - xform/è([a-z]*)$/e$1④/
    - xform/ī([a-z]*)$/i$1①/
    - xform/í([a-z]*)$/i$1②/
    - xform/ǐ([a-z]*)$/i$1③/
    - xform/ì([a-z]*)$/i$1④/
    - xform/ū([a-z]*)$/u$1①/
    - xform/ú([a-z]*)$/u$1②/
    - xform/ǔ([a-z]*)$/u$1③/
    - xform/ù([a-z]*)$/u$1④/
    - xform/ǖ([a-z]*)$/v$1①/
    - xform/ǘ([a-z]*)$/v$1②/
    - xform/ǚ([a-z]*)$/v$1③/
    - xform/ǜ([a-z]*)$/v$1④/
    - xform/ü/v/
    - xform/ń([a-z]*)$/n$1②/
    - xform/ň([a-z]*)$/n$1③/
    - xform/ǹ([a-z]*)$/n$1④/
    - xform/ḿ([a-z]*)$/m$1②/
    - xform/m̀([a-z]*)$/m$1④/
    - xlit/①②③④/7890
    # 简拼
    - abbrev/^([zcs]h).+$/$1/                        #zh ch sh作为整体
    - abbrev/^([zcs]h).+(\d)$/$1$2/                  #zh ch sh作为整体
    # 自动纠错
    - erase/^ng(\d)$/         #删除ng+数字的编码
    ## 改写规则
    - xform/^n(\d)/en$1/      # 改写编码n1 → en1
    - xform/^m(\d)/me$1/      # m1 → me1
    ## 缩写规则
    - abbrev/^ng(\d)$/ng/                            #ng1派生为ng
    - erase/^ng(\d)$/                                #删除ng开头+数字结尾的输入编码
    - abbrev/^([qwrtypsdfghjklzxcbnm]).+$/$1/        #不携带元音的声母派生出首字母简码来
    - abbrev/^([qwrtypsdfghjklzxcbnm]).+(\d)$/$1$2/  #不携带元音的声母派生出首字母简码来+数字声调
    - abbrev/^([aoe])([ioun])(\d)$/$1/               #携带两个字符的元音首字母派生出简码来
    - abbrev/^([aoe])([ioun])(\d)$/$1$3/             #携带两个字符的元音首字母派生出简码来+数字声调
    ## 派生规则
    - derive/(.+)(\d)/$1/     # 字母+数字 → 字母
    - derive/^ng(\d)$/eng$1/  # ng1 → eng1
    - derive/(.+)ong$/$1on/   # lon → long
    - derive/([tl])eng$/$1en/ # ten → teng
    - derive/([nl])ve(\d)/$1ue$2/                    #让üè兼容ue
    - derive/^([jqxy])v(\d)$/$1u$2/                  #让ü兼容u
    - derive/^([jqxy])u(\d)$/$1v$2/                  #让u兼容ü
    - derive/([zcs])h(a|e|i|u|ai|ei|an|en|ou|uo|ua|un|ui|uan|uai|uang|ang|eng|ong)$/h$1$2/  # hzi → zhi
    - derive/([zcs])h([aeiu])$/$1$2h/  # zih → zhi
    # ai
    - derive/^([wghk])ai$/$1ia/  # wia → wai
    # ia
    - derive/([qjx])ia$/$1ai/  # qai → qia
    # ei
    - derive/([wtfghkz])ei$/$1ie/
    # ie
    - derive/([jqx])ie$/$1ei/
    # ao
    - derive/([rtypsdghklzcbnm])ao$/$1oa/
    # ou
    - derive/([ypfm])ou$/$1uo/
    # ang
    - derive/([wrtypsdfghklzcbnm])ang$/$1nag/
    - derive/([wrtypsdfghklzcbnm])ang$/$1agn/
    # eng
    - derive/([wrtpsdfghklzcbnm])eng$/$1wng/
    - derive/([wrtpsdfghklzcbnm])eng$/$1neg/
    - derive/([wrtpsdfghklzcbnm])eng$/$1egn/
    # ing
    - derive/([qtypdjlxbnm])ing$/$1nig/
    - derive/([qtypdjlxbnm])ing$/$1ign/
    # ong
    - derive/([rtysdghklzcn])ong$/$1nog/
    - derive/([rtysdghklzcn])ong$/$1ogn/
    # iao
    - derive/([qtpdjlxbnm])iao$/$1ioa/
    - derive/([qtpdjlxbnm])iao$/$1oia/
    # ui
    - derive/([rtsghkzc])ui$/$1iu/
    # iu
    - derive/([qjlxnm])iu$/$1ui/
    # ian
    # - derive/([qtpdjlxbnm])ian$/$1iam/
    # iang
    - derive/([qjlxn])iang$/$1aing/
    - derive/([qjlxn])iang$/$1inag/
    # ua
    - derive/([g|k|h|zh|sh])ua$/$1au/
    # uai
    - derive/([g|h|k|zh|ch|sh])uai$/$1aui/
    - derive/([g|h|k|zh|ch|sh])uai$/$1uia/
    # un
    - derive/([qrtysdghjklzxc])un$/$1nu/
    # ue
    - derive/([nlyjqx])ue$/$1eu/
    # uang
    - derive/([g|h|k|zh|ch|sh])uang$/$1aung/
    - derive/([g|h|k|zh|ch|sh])uang$/$1uagn/
    - derive/([g|h|k|zh|ch|sh])uang$/$1unag/
    - derive/([g|h|k|zh|ch|sh])uang$/$1augn/
    # iong
    - derive/([jqx])iong$/$1inog/
    - derive/([jqx])iong$/$1oing/
    - derive/([jqx])iong$/$1iogn/
    - derive/([jqx])iong$/$1oign/
    # 其他
    - derive/ong$/on/  # lon → long
    - derive/([tl])eng$/$1en/  # ten → teng
    - 'xlit 7890 -/<\'
    - 'derive/^(.*)-$/$1;/'    # 一声映射为;键
    - 'derive/^(.*)<$/$1,/'    # 三声映射为,键
    - 'derive/^(.*)\\$/$1./'   # 四声映射为>键

wubi86_lookup:
  tag: wubi86
  dictionary: wubi86
  enable_user_dict: false
  enable_completion: true
  prefix: "`"
  tips: 〔五笔〕

radical_lookup:
  tag: radical
  dictionary: radical_pinyin
  enable_completion: false
  enable_sentence: false
  prefix: 'vv'
  tips: 〔拆字〕

reverse_lookup:
  tags: [wubi86,radical]
  overwrite_comment: true
  dictionary: wanxiang

# 标点符号
# punctuator 下面有三个子项：
#   full_shape 全角标点映射
#   half_shape 半角标点映射
#   symbols    Rime 的预设配置是以 '/' 前缀开头输出一系列字符，自定义的 symbols_v.yaml 修改成了 'v' 开头。
punctuator:
  full_shape:
    __include: default:/punctuator/full_shape  # 从 default.yaml 导入配置
  half_shape:
    __include: default:/punctuator/half_shape  # 从 default.yaml 导入配置
  digit_separators:
    __include: default:/punctuator/digit_separators # 从 default.yaml 导入配置
  symbols:
    __include: symbols:/symbols              # 从 symbols.yaml 导入配置

key_binder:
  import_preset: default
  bindings:
    # 上下翻页 - =
    # - { when: has_menu, accept: minus, send: Page_Up }             # 与地球拼音的音调1声 - 冲突，故注释掉
    # - { when: has_menu, accept: equal, send: Page_Down }           # 与地球拼音的音调1声 - 冲突，故注释掉
    
    # 上下翻页 tab
    - { when: has_menu, accept: Tab, send: Page_Down }
    - {send: Escape, accept: space, when: composing}
    - {send: space, accept: space, when: has_menu}
    - { when: always, select: .next, accept: Control+1 }             # 在最近的两个方案之间切换
    - { when: always, toggle: transcription, accept: Control+2}      # 切换简繁
    - { when: always, toggle: extend_charset, accept: Control+3 }    # 切换CJK字符集
    - { when: always, toggle: full_shape, accept: Control+4 }        # 切换全半角
    - { when: always, toggle: ascii_punct, accept: Control+5 }       # 切换中英标点

recognizer:
  import_preset: default
  patterns:
    punct: '^/([0-9]0?|[A-Za-z]+)$'
    radical: "vv[a-z]*'?$"
    wubi86: "^`[a-z]*'?$"
    unicode: "^U[a-f0-9]+"              # 脚本将自动获取第 2 个字符 U 作为触发前缀，响应 lua_translator@*unicode，输出 Unicode 字符
    number: "^R[0-9]+[.]?[0-9]*"        # 脚本将自动获取第 2 个字符 R 作为触发前缀，响应 lua_translator@*number，数字金额大写
    calculator: "^=.*$"                 # 计算器功能引导


